<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sach cong viec</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --line: #dbe3ee;
            --primary: #0f766e;
            --primary-hover: #115e59;
            --danger: #dc2626;
            --danger-hover: #b91c1c;
            --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            max-width: 980px;
            margin: 0 auto;
            padding: 40px 20px;
            line-height: 1.5;
            color: var(--text);
            background: linear-gradient(180deg, #eef6ff 0%, var(--bg) 100%);
        }

        h1 {
            margin: 0;
            font-size: 32px;
        }

        a {
            text-decoration: none;
        }

        button {
            cursor: pointer;
            border: none;
            transition: 0.2s ease;
        }

        .page {
            background: var(--surface);
            border: 1px solid rgba(219, 227, 238, 0.7);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 28px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .subtitle {
            margin: 8px 0 0;
            color: var(--muted);
        }

        .owner-line {
            margin: 12px 0 0;
            color: var(--primary);
            font-weight: 700;
        }

        .add-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border-radius: 12px;
            background: var(--primary);
            color: #fff;
            font-weight: 600;
        }

        .add-link:hover {
            background: var(--primary-hover);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 18px;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
        }

        th {
            background: #f8fafc;
            color: var(--muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        td {
            border-top: 1px solid var(--line);
        }

        tbody tr:hover {
            background: #f8fbff;
        }

        .empty {
            margin: 0;
            padding: 24px;
            text-align: center;
            color: var(--muted);
            background: #f8fafc;
            border: 1px dashed var(--line);
            border-radius: 18px;
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .actions form {
            margin: 0;
        }

        .edit-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 14px;
            border-radius: 10px;
            color: var(--primary);
            background: rgba(15, 118, 110, 0.1);
            font-weight: 600;
        }

        .edit-link:hover {
            background: rgba(15, 118, 110, 0.16);
        }

        .delete-btn {
            padding: 8px 14px;
            border-radius: 10px;
            background: rgba(220, 38, 38, 0.12);
            color: var(--danger);
            font-weight: 600;
        }

        .delete-btn:hover {
            background: var(--danger);
            color: #fff;
        }

        @media (max-width: 768px) {
            .page {
                padding: 20px;
                border-radius: 18px;
            }

            .header {
                flex-direction: column;
                align-items: stretch;
            }

            h1 {
                font-size: 28px;
            }

            table, thead, tbody, tr, th, td {
                display: block;
            }

            thead {
                display: none;
            }

            table {
                border: none;
            }

            tbody {
                display: grid;
                gap: 14px;
            }

            tr {
                border: 1px solid var(--line);
                border-radius: 16px;
                overflow: hidden;
                background: #fff;
            }

            td {
                border-top: 1px solid var(--line);
                padding: 12px 14px;
            }

            td:first-child {
                border-top: none;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="header">
        <div>
            <h1>Danh sach cong viec</h1>
            <p class="subtitle">Quan ly cac cong viec can xu ly trong ngay mot cach gon gang.</p>
            <p class="owner-line" th:text="${'Danh sach cua: ' + ownerName}">Danh sach cua:</p>
        </div>
        <a class="add-link" th:href="@{/add-todo}">+ Them cong viec</a>
    </div>

    <table th:if="${!#lists.isEmpty(todos)}">
        <thead>
        <tr>
            <th>Nội Dung</th>
            <th>Hạn</th>
            <th>Trạn thái</th>
            <th>Ưu tiên</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="todo : ${todos}">
            <td th:text="${todo.content}"></td>
            <td th:text="${todo.dueDate}"></td>
            <td th:text="${todo.status}"></td>
            <td th:text="${todo.priority}"></td>
            <td>
                <div class="actions">
                    <a class="edit-link" th:href="@{/edit-todo/{id}(id=${todo.id})}">Sua</a>
                    <form th:action="@{/delete-todo/{id}(id=${todo.id})}" method="post">
                        <button class="delete-btn" type="submit" onclick="return confirm('Bạn có chắc muốn xóa không?')">Xoa</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <p class="empty" th:if="${#lists.isEmpty(todos)}">Chua co cong viec nao.</p>
</div>
</body>
</html>

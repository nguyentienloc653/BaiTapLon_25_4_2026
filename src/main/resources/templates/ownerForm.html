<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nhap chu so huu</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --line: #dbe3ee;
            --primary: #0f766e;
            --primary-hover: #115e59;
            --error: #dc2626;
            --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            max-width: 640px;
            margin: 0 auto;
            padding: 40px 20px;
            line-height: 1.5;
            color: var(--text);
            background: linear-gradient(180deg, #eef6ff 0%, var(--bg) 100%);
        }

        .page {
            background: var(--surface);
            border: 1px solid rgba(219, 227, 238, 0.7);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 28px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 30px;
        }

        .subtitle {
            margin: 0 0 24px;
            color: var(--muted);
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            font-weight: 600;
        }

        input, button {
            width: 100%;
            padding: 12px 14px;
            font-size: 15px;
            border-radius: 12px;
        }

        input {
            border: 1px solid var(--line);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
        }

        button {
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .error {
            margin: 0;
            color: var(--error);
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="page">
    <h1>Nhap chu so huu</h1>
    <p class="subtitle">Vui long nhap ten chu so huu truoc khi su dung danh sach cong viec.</p>

    <form th:action="@{/owner}" method="post">
        <div>
            <label for="ownerName">Chu so huu</label>
            <input id="ownerName" name="ownerName" type="text" th:value="${ownerName}" placeholder="Nhap ten chu so huu">
        </div>

        <p class="error" th:if="${ownerError}" th:text="${ownerError}"></p>

        <button type="submit">Bat dau</button>
    </form>
</div>
</body>
</html>
